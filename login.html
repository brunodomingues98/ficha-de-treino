<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <title>Ficha de Treino — Entrar</title>
  <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/images/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>body { padding: 0; }</style>
</head>
<body>

<!-- BLOCO DESKTOP -->
<div class="desktop-block">
  <h1>Este app é exclusivo para dispositivos móveis 📱</h1>
  <p>Acesse pelo seu smartphone para a melhor experiência.</p>
  <img src="/assets/images/treino-ideal.png" alt="Use o celular">
</div>

<!-- TELA DE LOGIN -->
<div class="mobile-app login-page" id="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="brand">Ficha de Treino</div>
      <p>Seus treinos, sempre na palma da mão</p>
    </div>

    <div class="login-error" id="login-error"></div>

    <div class="login-form">
      <div class="field-group">
        <label for="email-login">E-mail</label>
        <input type="email" id="email-login" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field-group">
        <label for="senha-login">Senha</label>
        <input type="password" id="senha-login" placeholder="••••••••" autocomplete="current-password">
      </div>
      <label class="remember-me-row">
        <input type="checkbox" id="lembrar-login">
        <span>Lembrar meu login</span>
      </label>
      <button class="btn-primary" id="btn-entrar">Entrar</button>
    </div>

    <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:18px;line-height:1.5">
      Não tem uma conta? Fale com seu professor para receber<br>seu acesso.
    </p>
    <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:10px">
      É professor? <a href="/cadastro-professor.html" style="color:var(--gold)">Cadastre-se aqui</a>
    </p>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged,
           setPersistence, browserLocalPersistence, browserSessionPersistence }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDldCAsRyzMoZ3UJHaqpO-o_jdE_hWF5Cw",
    authDomain:        "ficha-de-treino-ba542.firebaseapp.com",
    projectId:         "ficha-de-treino-ba542",
    storageBucket:     "ficha-de-treino-ba542.firebasestorage.app",
    messagingSenderId: "1725577428",
    appId:             "1:1725577428:web:eace2780d5ce3ca669a341"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ── Redireciona se já logado, conforme o papel (role) ─────
  onAuthStateChanged(auth, async user => {
    if (!user) return;
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists()) { window.location.href = '/index.html'; return; }

      const data = snap.data();

      // ── PROFESSOR ──────────────────────────────────────
      if (data.role === 'professor') {
        if (data.status === 'pendente') {
          showError('Seu cadastro ainda está aguardando aprovação. Tente novamente mais tarde.');
          await signOut(auth);
          return;
        }
        if (data.status === 'inativo') {
          showError('Sua conta está inativa. Fale com o administrador do sistema.');
          await signOut(auth);
          return;
        }
        window.location.href = '/professor.html';
        return;
      }

      // ── ADMIN ──────────────────────────────────────────
      if (data.role === 'admin') {
        window.location.href = '/admin.html';
        return;
      }

      // ── ALUNO ──────────────────────────────────────────
      // checa se o professor responsável está ativo
      if (data.professorId) {
        const profSnap = await getDoc(doc(db, 'users', data.professorId));
        if (profSnap.exists() && profSnap.data().status === 'inativo') {
          showError('Seu professor está temporariamente inativo. Acesso indisponível.');
          await signOut(auth);
          return;
        }
      }

      window.location.href = '/index.html';
    } catch {
      window.location.href = '/index.html';
    }
  });

  const errorEl = document.getElementById('login-error');
  function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('show'); }
  function hideError() { errorEl.classList.remove('show'); }

  // ── Lembrar login: pré-preenche e-mail salvo anteriormente ──
  const STORAGE_KEY = 'ficha-treino-lembrar-email';
  const emailInput = document.getElementById('email-login');
  const lembrarCheckbox = document.getElementById('lembrar-login');

  const emailSalvo = localStorage.getItem(STORAGE_KEY);
  if (emailSalvo) {
    emailInput.value = emailSalvo;
    lembrarCheckbox.checked = true;
    document.getElementById('senha-login').focus();
  }

  const btn = document.getElementById('btn-entrar');
  btn.dataset.label = btn.textContent;
  function setLoading(loading) {
    btn.disabled = loading;
    btn.textContent = loading ? 'Aguarde...' : btn.dataset.label;
  }

  document.getElementById('senha-login').addEventListener('keydown', e => {
    if (e.key === 'Enter') btn.click();
  });

  btn.addEventListener('click', async () => {
    hideError();
    const email = emailInput.value.trim();
    const senha = document.getElementById('senha-login').value;
    const lembrar = lembrarCheckbox.checked;
    if (!email || !senha) return showError('Preencha e-mail e senha.');
    setLoading(true);
    try {
      // Define se a sessão persiste após fechar o navegador/app
      // (lembrar) ou só dura a aba atual (não lembrar).
      await setPersistence(auth, lembrar ? browserLocalPersistence : browserSessionPersistence);

      if (lembrar) {
        localStorage.setItem(STORAGE_KEY, email);
      } else {
        localStorage.removeItem(STORAGE_KEY);
      }

      await signInWithEmailAndPassword(auth, email, senha);
    } catch (e) {
      setLoading(false);
      showError(friendlyError(e.code));
    }
  });

  function friendlyError(code) {
    const map = {
      'auth/user-not-found':         'Nenhuma conta com esse e-mail.',
      'auth/wrong-password':         'Senha incorreta.',
      'auth/invalid-email':          'E-mail inválido.',
      'auth/too-many-requests':      'Muitas tentativas. Aguarde alguns minutos.',
      'auth/network-request-failed': 'Sem conexão. Verifique sua internet.',
      'auth/invalid-credential':     'E-mail ou senha incorretos.',
    };
    return map[code] || `Erro: ${code}`;
  }
</script>
<script src="/assets/js/pwa.js"></script>
</body>
</html>
